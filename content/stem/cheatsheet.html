<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheat-Sheet Builder · Study Hub</title>
<link rel="stylesheet" href="../../style.css">
<script>
  window.MathJax = { tex: { inlineMath:[['\\(','\\)']], displayMath:[['\\[','\\]']] }, svg:{ fontCache:'global' } };
</script>
<script async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<script>(function(){try{var t=localStorage.getItem("studyhub_theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<style>
  .cs-wrap { max-width: 1120px; margin: 0 auto; padding: 22px 48px 90px; }
  .cs-intro { font-size:.9rem; color:var(--text2); line-height:1.6; max-width:820px; }
  .cs-intro b { color:var(--text); }

  /* sticky toolbar (gauge + actions) */
  .cs-bar { position:sticky; top:0; z-index:30; display:flex; flex-wrap:wrap; align-items:center; gap:14px;
    background:var(--topbar-bg,var(--bg)); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:12px 0; margin:16px 0; }
  .cs-gauge-wrap { flex:1 1 220px; min-width:190px; }
  .cs-gauge-bar { height:7px; border-radius:99px; background:var(--bg3); overflow:hidden; }
  .cs-gauge-fill { height:7px; border-radius:99px; transition:width .3s, background .3s; }
  .cs-gauge-txt { font-family:'DM Mono',monospace; font-size:.62rem; margin-top:5px; }
  .cs-bar-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .cs-stat { font-family:'DM Mono',monospace; font-size:.6rem; color:var(--text3); margin-right:4px; }
  .cs-act { font-family:'DM Mono',monospace; font-size:.63rem; padding:7px 12px; border-radius:7px; border:1px solid var(--border); background:none; cursor:pointer; color:var(--text2); }
  .cs-act:hover { color:var(--text); border-color:var(--text3); }
  .cs-act.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .cs-act.primary:hover { filter:brightness(.95); color:#fff; }

  /* continuous multi-column flow — headers + items pack like a real cheat sheet */
  #cs-quiz { column-count:2; column-gap:16px; }
  @media (min-width:1080px){ #cs-quiz{ column-count:3; } }
  @media (max-width:680px){ #cs-quiz{ column-count:1; } }
  .cs-grp-label { break-inside:avoid; break-after:avoid; font-family:'DM Mono',monospace; font-size:.63rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin:4px 0 8px; padding-bottom:5px; border-bottom:1px solid var(--accent-25,var(--border)); display:flex; align-items:baseline; gap:8px; }
  .cs-grp-label .gc { margin-left:auto; color:var(--text3); font-size:.54rem; letter-spacing:.03em; }
  .cs-q { break-inside:avoid; background:var(--bg2); border:1px solid var(--border); border-radius:9px; padding:9px 11px; margin:0 0 8px; transition:.12s; }
  .cs-q.need { border-left:3px solid var(--dt,#c2570c); }
  .cs-q.know { opacity:.42; }
  .cs-q-text { font-size:.84rem; color:var(--text); line-height:1.4; margin-bottom:7px; }
  .cs-q-text .meth { color:var(--accent); font-weight:600; }
  .cs-btns { display:flex; gap:6px; }
  .cs-b { font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.03em; padding:4px 9px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text3); cursor:pointer; transition:.12s; white-space:nowrap; }
  .cs-b:hover { color:var(--text); border-color:var(--text3); }
  .cs-b.know-b.on { background:#15803d; border-color:#15803d; color:#fff; }
  .cs-b.need-b.on { background:var(--dt,#c2570c); border-color:var(--dt,#c2570c); color:#fff; }
  .cs-formula { margin-top:8px; padding-top:7px; border-top:1px dashed var(--border); }
  .cs-q:not(.need) .cs-formula { display:none; }
  .cs-print-q { display:none; }
  .cs-item-f { font-size:.82rem; line-height:1.5; color:var(--text); overflow-x:auto; }
  mjx-container[display="true"]{ overflow-x:auto; overflow-y:hidden; max-width:100%; }

  /* PRINT — only the marked formulas, continuous dense 3-column, inline headers, NO clipping */
  @page { size: A4; margin: 7mm; }
  @media print {
    .topbar, .crumbs, .cs-intro, .cs-bar, .theme-toggle, .footer-note, h1,
    .cs-q-text, .cs-btns, .cs-grp-label .gc { display:none !important; }
    .cs-wrap { max-width:none; padding:0; }
    #cs-quiz { column-count:3; column-gap:5mm; }
    .cs-grp-label { color:#000; font-weight:700; font-size:7.6pt; letter-spacing:.02em; text-transform:none; border-bottom:.6pt solid #888; margin:1pt 0 1.5pt; padding-bottom:.5pt; }
    .cs-grp-label[data-need="0"] { display:none !important; }
    .cs-q { background:none !important; border:none !important; padding:0 !important; margin:0 0 3pt !important; }
    .cs-q:not(.need) { display:none !important; }
    .cs-formula { margin:0 !important; padding:0 !important; border:none !important; }
    .cs-print-q { display:block; font-size:6.6pt; font-weight:700; color:#000; margin-bottom:.4pt; }
    .cs-item-f { font-size:7.2pt; line-height:1.26; color:#000; overflow:visible !important; }
    mjx-container { overflow:visible !important; font-size:80% !important; }
    body { background:#fff; color:#000; }
  }
</style>
</head>

<header class="topbar">
  <span class="topbar-title">Study Hub</span>

</header>

<div class="cs-wrap">

  <p class="cs-intro" id="cs-intro"></p>

  <div class="cs-bar">
    <div class="cs-gauge-wrap">
      <div class="cs-gauge-bar"><div class="cs-gauge-fill" id="cs-gauge-fill"></div></div>

    <div class="cs-bar-actions">
      <span class="cs-stat" id="cs-stat"></span>

      <button class="cs-act" id="cs-reset">Reset</button>
      <button class="cs-act primary" onclick="window.print()">⎙ Print / Save PDF</button>
    </div>

  <div id="cs-quiz"></div>
</div>

<div class="footer-note">RAFI ADIFA MAULANA · CHEAT-SHEET BUILDER</div>

<script>
/* ════════════════ SKILL BANKS — fine-grained "do you know this trick?" ════════════════
   Each item: [ topic , q (the prompt) , f (formula/method for the printed sheet) ]      */
const BANKS = {
  la: {
    name:'Linear Algebra',
    exam:'Final: only ONE A4 cheat sheet (double-sided = 2 pages). Mark a method “need it” ONLY if you can\'t reconstruct it cold — keep the sheet to its 2-page budget below.',
    skills:[
      /* ── RREF & linear maps ── */
      ['RREF & linear maps','find RREF, rank & free columns','Eliminate below pivots → above → scale pivots to 1. #pivots \\(=\\operatorname{rank}\\); columns without a pivot are free.'],
      ['RREF & linear maps','turn a geometric map into its matrix','Track each \\(e_i\\): column \\(i=Ae_i\\). Build rotations/reflections/shears/scalings directly from the action on \\(e_i\\).'],
      ['RREF & linear maps','projection / reflection / rotation matrices','Proj onto \\(n^\\perp\\): \\(P=I-\\tfrac{nn^{\\mathsf T}}{n^{\\mathsf T}n}\\). Reflection: \\(H=I-\\tfrac{2nn^{\\mathsf T}}{n^{\\mathsf T}n}\\ (H^2=I)\\). Rotation \\(\\theta\\): \\(\\bigl(\\begin{smallmatrix}\\cos\\theta&-\\sin\\theta\\\\\\sin\\theta&\\cos\\theta\\end{smallmatrix}\\bigr)\\).'],
      ['RREF & linear maps','recover \\(A\\) from RREF + column relations','RREF encodes every dependency: free col \\(=\\) combo of preceding pivot cols. Anchor pivot columns with known entries, rebuild the rest.'],
      ['RREF & linear maps','solve \\(Ax=b\\) (full solution set)','Row-reduce \\([A\\,|\\,b]\\); consistent if no pivot in the aug. col. \\(x=x_p+x_h,\\ x_h\\in\\ker A\\) (one per free var).'],
      ['RREF & linear maps','rank identities','\\(\\operatorname{rank}A=\\operatorname{rank}A^{\\mathsf T}\\); \\(\\operatorname{rank}(AB)\\le\\min\\); \\(\\operatorname{rank}(A^{\\mathsf T}A)=\\operatorname{rank}A\\); invertible \\(C\\Rightarrow\\operatorname{rank}(AC)=\\operatorname{rank}A\\).'],
      /* ── Inverses, LU/LDU ── */
      ['Inverses & LU/LDU','inverse by row reduction','\\([A\\,|\\,I]\\xrightarrow{\\text{row ops}}[I\\,|\\,A^{-1}]\\).'],
      ['Inverses & LU/LDU','LU / LDU decomposition','Forward elim: multipliers → \\(L\\) (unit lower), pivots → \\(D\\), unit upper → \\(U\\). Exists \\(\\iff\\) every leading principal minor \\(\\neq0\\).'],
      ['Inverses & LU/LDU','solve \\(Ax=b\\) using a known \\(LU\\)','\\(PA=LU\\): solve \\(Ly=Pb\\) (forward), then \\(Ux=y\\) (back). Don\'t re-invert \\(A\\) for new \\(b\\)\'s.'],
      ['Inverses & LU/LDU','inverse of a product','\\((AB)^{-1}=B^{-1}A^{-1}\\); \\((ABC)^{-1}=C^{-1}B^{-1}A^{-1}\\); \\((A^{\\mathsf T})^{-1}=(A^{-1})^{\\mathsf T}\\).'],
      ['Inverses & LU/LDU','Sherman–Morrison (rank-1 update)','\\((A+uv^{\\mathsf T})^{-1}=A^{-1}-\\dfrac{A^{-1}uv^{\\mathsf T}A^{-1}}{1+v^{\\mathsf T}A^{-1}u}\\).'],
      ['Inverses & LU/LDU','pseudo-inverse & polynomial of a projection','Full col rank: \\(A^{+}=(A^{\\mathsf T}A)^{-1}A^{\\mathsf T}\\); \\(AA^{+}\\) is an orthogonal projection, so \\((AA^{+})^k=AA^{+}\\) and \\(p(AA^{+})=p(1)AA^{+}+p(0)(I-AA^{+})\\).'],
      /* ── Determinants ── */
      ['Determinants','cofactor / expansion & triangular det','\\(\\det=\\sum_j(-1)^{i+j}a_{ij}M_{ij}\\); triangular \\(\\Rightarrow\\det=\\prod\\) diagonal. Row swap flips sign; add-multiple-of-row leaves it.'],
      ['Determinants','determinant rules','\\(\\det(cA)=c^n\\det A,\\ \\det(A^{-1})=\\tfrac1{\\det A},\\ \\det(AB)=\\det A\\det B,\\ \\det A^{\\mathsf T}=\\det A,\\ \\det A=\\prod\\lambda_i\\).'],
      ['Determinants','Cramer\'s rule','\\(x_i=\\dfrac{\\det A_i}{\\det A}\\), \\(A_i=A\\) with column \\(i\\) replaced by \\(b\\).'],
      /* ── Four subspaces & projections ── */
      ['Four subspaces & projections','find the four fundamental subspaces','From RREF\\((A)\\): col space = original pivot cols; \\(\\ker A\\) from free vars; row space = nonzero RREF rows; \\(\\ker A^{\\mathsf T}\\) (\\(\\dim=m-r\\)).'],
      ['Four subspaces & projections','rank–nullity','\\(\\operatorname{rank}A+\\operatorname{nullity}A=\\) #cols. \\(\\mathbb R^n=\\operatorname{Ran}A^{\\mathsf T}\\oplus\\ker A\\), \\(\\mathbb R^m=\\operatorname{Ran}A\\oplus\\ker A^{\\mathsf T}\\).'],
      ['Four subspaces & projections','\\(V\\cap W\\), \\(V+W\\) and their dimensions','Write each as \\(\\ker C\\). \\(V\\cap W\\): stack systems. \\(V+W\\): concatenate bases, reduce. \\(\\dim(V+W)=\\dim V+\\dim W-\\dim(V\\cap W)\\).'],
      ['Four subspaces & projections','projection matrices','Onto \\(\\operatorname{Ran}A\\): \\(P=A(A^{\\mathsf T}A)^{-1}A^{\\mathsf T}\\). Onto \\(\\operatorname{span}(w)\\): \\(\\tfrac{ww^{\\mathsf T}}{w^{\\mathsf T}w}\\). Complement: \\(I-P\\). Always \\(P^2=P=P^{\\mathsf T}\\).'],
      /* ── Least squares ── */
      ['Least squares','least-squares solution','\\(\\hat x=(A^{\\mathsf T}A)^{-1}A^{\\mathsf T}b\\) solves the normal equations \\(A^{\\mathsf T}A\\hat x=A^{\\mathsf T}b\\); minimizes \\(\\lVert Ax-b\\rVert\\). Residual \\(\\perp\\operatorname{Ran}A\\).'],
      /* ── Eigenvalues & diagonalization ── */
      ['Eigenvalues & diagonalization','characteristic polynomial & eigen-pairs','\\(p(\\lambda)=\\det(A-\\lambda I)=0\\) gives \\(\\lambda\\); solve \\((A-\\lambda I)v=0\\) for eigenvectors.'],
      ['Eigenvalues & diagonalization','eigenvalues → det, trace, powers','\\(\\det A=\\prod\\lambda_i,\\ \\operatorname{tr}A=\\sum\\lambda_i,\\ \\operatorname{tr}(A^k)=\\sum\\lambda_i^k\\). Eigenvalues of \\(A^{-1}\\) are \\(1/\\lambda\\), of \\(A+cI\\) are \\(\\lambda+c\\).'],
      ['Eigenvalues & diagonalization','diagonalize & take powers','\\(A=PDP^{-1}\\) (\\(P\\) eigenvectors, \\(D\\) eigenvalues) \\(\\Rightarrow A^k=PD^kP^{-1}\\). Needs \\(n\\) independent eigenvectors.'],
      ['Eigenvalues & diagonalization','test diagonalizability (multiplicities)','Diagonalizable \\(\\iff\\) for every \\(\\lambda\\), geometric mult \\(\\dim\\ker(A-\\lambda I)\\) \\(=\\) algebraic mult.'],
      ['Eigenvalues & diagonalization','Cayley–Hamilton trick','\\(p(A)=0\\). Use it to write \\(A^{-1}\\) and high powers as low-degree polynomials in \\(A\\) (e.g. \\(A^2=2A-I\\Rightarrow A^{-1}=2I-A\\)).'],
      ['Eigenvalues & diagonalization','similar matrices invariants','\\(B=P^{-1}AP\\) share det, trace, char. poly, eigenvalues, rank — but NOT eigenvectors.'],
      /* ── Symmetric, spectral, definiteness ── */
      ['Symmetric, spectral & definiteness','spectral theorem','Symmetric \\(A=Q\\Lambda Q^{\\mathsf T}\\): real \\(\\lambda\\), orthonormal eigenvectors (columns of \\(Q\\), \\(Q^{\\mathsf T}=Q^{-1}\\)); distinct \\(\\lambda\\Rightarrow\\) orthogonal eigenvectors.'],
      ['Symmetric, spectral & definiteness','classify definiteness','Pos-def \\(\\iff\\) all \\(\\lambda>0\\iff\\) all leading principal minors \\(>0\\) (Sylvester). Indefinite \\(\\iff\\) mixed-sign eigenvalues.'],
      ['Symmetric, spectral & definiteness','quadratic forms & surfaces','\\(q(x)=x^{\\mathsf T}Ax\\) (\\(A\\) symmetric). Diagonalize \\(A=Q\\Lambda Q^{\\mathsf T}\\); in \\(y=Q^{\\mathsf T}x\\) coords \\(q=\\sum\\lambda_i y_i^2\\) → surface type from signs of \\(\\lambda_i\\).'],
      /* ── Orthogonality, Gram–Schmidt, QR ── */
      ['Orthogonality, Gram–Schmidt, QR','Gram–Schmidt orthonormalization','\\(u_k=v_k-\\sum_{j<k}\\langle v_k,e_j\\rangle e_j,\\quad e_k=\\dfrac{u_k}{\\lVert u_k\\rVert}\\). (Subtract projections onto the ones you already have, then normalize.)'],
      ['Orthogonality, Gram–Schmidt, QR','QR decomposition','\\(A=QR\\): \\(Q\\)= Gram–Schmidt orthonormal columns, \\(R=Q^{\\mathsf T}A\\) (upper-triangular). Make \\(R\\)\'s diagonal \\(>0\\) by sign choice.'],
      ['Orthogonality, Gram–Schmidt, QR','orthogonal complement & decomposition','\\(W^\\perp=\\ker(\\text{rows}=W\\text{ basis})\\); any \\(v=\\operatorname{proj}_W v+\\operatorname{proj}_{W^\\perp}v\\).'],
      /* ── SVD ── */
      ['SVD','singular values & SVD','\\(A=U\\Sigma V^{\\mathsf T}\\): \\(\\sigma_i=\\sqrt{\\lambda_i(A^{\\mathsf T}A)}\\); \\(V\\)= orthonormal eigenvectors of \\(A^{\\mathsf T}A\\); \\(u_i=\\tfrac1{\\sigma_i}Av_i\\).'],
      ['SVD','SVD as geometry (ellipse image)','\\(A(\\text{unit sphere})\\) is an ellipsoid with semi-axis lengths \\(\\sigma_i\\) pointing along the \\(u_i\\). Largest stretch \\(=\\sigma_{\\max}\\).'],
      /* ── Cholesky & factorizations ── */
      ['Cholesky & factorizations','Cholesky \\(A=LL^{\\mathsf T}\\) (the trick)','SPD only. Column by column: \\(l_{jj}=\\sqrt{a_{jj}-\\sum_{k<j}l_{jk}^2}\\), \\(l_{ij}=\\dfrac{a_{ij}-\\sum_{k<j}l_{ik}l_{jk}}{l_{jj}}\\ (i>j)\\). Exists \\(\\iff A\\) symmetric pos-def.'],
      ['Cholesky & factorizations','\\(LDL^{\\mathsf T}\\) variant','Symmetric \\(A=LDL^{\\mathsf T}\\) (unit-lower \\(L\\), diagonal \\(D\\)) — Cholesky with \\(\\sqrt D\\) pulled out; avoids square roots.'],
      /* ── Abstract spaces & change of basis ── */
      ['Abstract spaces & change of basis','matrix of a map on a function/poly space','Basis \\(B=(f_1,\\dots)\\); apply \\(T\\) (e.g. \\(D=d/dx\\)) to each \\(f_i\\), write the result in \\(B\\)-coords → those columns form \\([T]_B\\).'],
      ['Abstract spaces & change of basis','matrix of \\(T(X)=AX+XA\\) or commutator \\(AX-XA\\)','Use basis \\((E_{11},E_{12},E_{21},E_{22})\\); compute \\(T(E_{ij})\\), express in that basis → columns of \\([T]_B\\).'],
      ['Abstract spaces & change of basis','coordinates & map under an exotic basis','\\(P=[\\,b_1|\\dots|b_n\\,]\\) (std→\\(B\\)). \\([x]_B=P^{-1}x\\); \\([T]_B=P^{-1}T_{\\text{std}}P\\).'],
      ['Abstract spaces & change of basis','change-of-coordinate matrices','\\([v]_{\\mathcal C}=P_{\\mathcal C\\leftarrow\\mathcal B}[v]_{\\mathcal B}\\); columns of \\(P_{\\mathcal C\\leftarrow\\mathcal B}\\) = \\(\\mathcal B\\)-vectors in \\(\\mathcal C\\)-coords; \\(P_{\\mathcal B\\leftarrow\\mathcal C}=(P_{\\mathcal C\\leftarrow\\mathcal B})^{-1}\\); \\([T]_{\\mathcal C}=P[T]_{\\mathcal B}P^{-1}\\).'],
      ['Abstract spaces & change of basis','linearity check / nilpotent operator powers','\\(T(X+Y)=TX+TY,\\ T(kX)=kTX\\). If \\(A^k=O\\) then \\(T(X)=AX+XA\\) has \\(T^{2k-1}=O\\) (binomial in \\(L_A,R_A\\)).'],
      /* ── Block matrices ── */
      ['Block matrices','block LDU & Schur complement','\\(\\bigl(\\begin{smallmatrix}R&B\\\\C&D\\end{smallmatrix}\\bigr)\\), \\(R\\) invertible: \\(\\det=\\det R\\,\\det S\\), \\(S=D-CR^{-1}B\\). Kill the \\((1,2)\\) block: \\(\\text{row}_1-BD^{-1}\\text{row}_2\\).'],
      ['Block matrices','block inverse / solving \\(MX=N\\)','Treat blocks like scalars but keep order. Augment \\([M\\,|\\,N]\\) and block-eliminate to \\([I\\,|\\,X]\\). Block rank \\(\\le\\) sum of diagonal-block ranks.'],
      /* ── Applications ── */
      ['Applications','Markov chains / steady state','Stochastic \\(P\\) (columns sum to 1): steady state \\(\\pi\\) solves \\(P\\pi=\\pi\\) — eigenvector for \\(\\lambda=1\\), normalized so \\(\\sum\\pi_i=1\\).'],
      ['Applications','powers \\(A^k\\) & linear ODE systems','\\(A^k=PD^kP^{-1}\\) (or via Cayley–Hamilton). \\(x\'=Ax\\Rightarrow x(t)=Pe^{Dt}P^{-1}x_0=\\sum c_ie^{\\lambda_it}v_i\\).'],
      ['Applications','nilpotent inverse series','\\(N^k=O\\Rightarrow(I+N)^{-1}=I-N+N^2-\\dots+(-1)^{k-1}N^{k-1}\\).'],
      /* ── Quick reference ── */
      ['Quick reference','invertibility equivalences','\\(A\\) invertible \\(\\iff\\) full rank \\(\\iff\\) RREF \\(=I\\iff\\ker=\\{0\\}\\iff\\det\\neq0\\iff0\\) not an eigenvalue.'],
    ]
  },
  calc: {
    name:'Calculus A2',
    exam:'Covers the differential-calculus midterm tricks AND the integral/series final. Final is open-book, but a sheet still buys speed — mark a method “need it” only if it slows you down.',
    skills:[
      /* ── Limits & continuity ── */
      ['Limits & continuity','test a 2-variable limit / continuity at a point','Try paths (\\(y=mx,\\ y=x^2\\)) — different limits ⇒ DNE. To prove it exists, bound \\(|f-L|\\le g(r)\\to0\\) (squeeze, polar).'],
      ['Limits & continuity','continuity of a piecewise function at the boundary','Both pieces must give the same value as the boundary point: \\(\\lim_{\\text{both sides}}f=f(x_0,y_0)\\). Handy bound \\(\\bigl|\\tfrac{x^2-y^2}{x^2+y^2}\\bigr|\\le1\\).'],
      /* ── Partial derivatives ── */
      ['Partial derivatives','partial derivative from the definition','\\(f_x(x_0,y_0)=\\lim_{h\\to0}\\dfrac{f(x_0+h,y_0)-f(x_0,y_0)}{h}\\). Check \\(h\\to0^{+}\\) and \\(0^{-}\\); if they differ ⇒ DNE. Needed at corners/boundaries.'],
      ['Partial derivatives','Clairaut\'s theorem (mixed partials)','\\(f_{xy}=f_{yx}\\) at \\(p\\) IF \\(f_{xy}\\) is continuous at \\(p\\). They can fail to match at a bad point — verify from the definition there.'],
      ['Partial derivatives','partials in polar (chain rule)','\\(x=r\\cos\\theta,\\ y=r\\sin\\theta\\): \\(D_rF=F_x\\cos\\theta+F_y\\sin\\theta\\), \\(D_\\theta F=-F_x r\\sin\\theta+F_y r\\cos\\theta\\).'],
      /* ── Differentiability ── */
      ['Differentiability','Jacobian & the differentiability criterion','\\([DF]_{ij}=\\partial F_i/\\partial x_j\\). \\(F\\) differentiable at a point if all partials are continuous there (sufficient).'],
      ['Differentiability','prove differentiability at the origin','Check \\(\\lim_{\\mathbf h\\to0}\\dfrac{|f(\\mathbf h)-f(0)-\\nabla f(0)\\cdot\\mathbf h|}{\\lVert\\mathbf h\\rVert}=0\\). Trick: if \\(|f(\\mathbf h)|\\le C\\lVert\\mathbf h\\rVert^{k}\\) with \\(k>1\\), it\'s differentiable.'],
      ['Differentiability','linear approximation','\\(F(\\mathbf x_0+\\mathbf h)\\approx F(\\mathbf x_0)+[DF(\\mathbf x_0)]\\mathbf h\\).'],
      ['Differentiability','tangent plane to a level set \\(F=0\\)','\\(\\nabla F(p)\\cdot(\\mathbf x-p)=0\\); \\(\\nabla F(p)\\) is the normal.'],
      /* ── Newton, inverse & implicit ── */
      ['Newton, inverse & implicit','one Newton step in \\(\\mathbb R^n\\)','\\(\\mathbf x_{n+1}=\\mathbf x_n-[DF(\\mathbf x_n)]^{-1}F(\\mathbf x_n)\\). \\(2\\times2\\) inverse \\(\\tfrac1{ad-bc}\\bigl(\\begin{smallmatrix}d&-b\\\\-c&a\\end{smallmatrix}\\bigr)\\).'],
      ['Newton, inverse & implicit','Inverse Function Theorem','\\(F\\) is locally invertible near \\(p\\) iff \\(\\det[DF(p)]\\neq0\\), and then \\([DF^{-1}(F(p))]=[DF(p)]^{-1}\\).'],
      ['Newton, inverse & implicit','implicit differentiation (IFT partials)','From \\(F(\\dots)=0\\): \\(\\dfrac{\\partial R}{\\partial I}=-\\dfrac{F_I}{F_R}\\), \\(\\dfrac{dy}{dx}=-\\dfrac{F_x}{F_y}\\). (Solve for the variable whose partial sits in the denominator.)'],
      ['Newton, inverse & implicit','source / sink via eigenvalues of \\([DF]\\)','All \\(\\operatorname{Re}\\lambda>0\\) ⇒ source; all \\(<0\\) ⇒ sink; mixed ⇒ saddle. \\(2\\times2\\): \\(\\lambda^2-\\operatorname{tr}\\lambda+\\det=0\\).'],
      /* ── Optimization ── */
      ['Optimization','critical points & the Hessian test','\\(\\nabla f=0\\); \\(D=f_{xx}f_{yy}-f_{xy}^2\\). \\(D>0,f_{xx}<0\\)→max; \\(D>0,f_{xx}>0\\)→min; \\(D<0\\)→saddle; \\(D=0\\)→inconclusive.'],
      ['Optimization','constrained optimization on a boundary','On \\(x=c\\), substitute → \\(g(y)=f(c,y)\\), solve \\(g\'(y)=0\\). Always also check the segment ENDPOINTS / corners.'],
      ['Optimization','Lagrange multipliers','Extremize \\(f\\) s.t. \\(g=c\\): \\(\\nabla f=\\lambda\\nabla g,\\ g=c\\). Two constraints: \\(\\nabla f=\\lambda\\nabla g+\\mu\\nabla h\\).'],
      ['Optimization','gradient, directional derivative, steepest ascent','\\(\\nabla f\\) = steepest-ascent direction; \\(D_uf=\\nabla f\\cdot u\\) (\\(u\\) unit). On a constraint surface \\(F=0\\), steepest ascent of \\(T\\) is along \\((\\nabla T,\\,|\\nabla T|^2)\\)-type tangent.'],
      /* ── Matrix-valued / abstract derivatives ── */
      ['Matrix-valued derivatives','derivative of a matrix-valued map','\\(h(A)=A^2\\Rightarrow[Dh(A)](X)=AX+XA\\). For linear \\(L\\): \\([DL](v)=L(v)\\). Product rule \\(D(xy^{\\mathsf T})=x\\,(dy)^{\\mathsf T}+(dx)\\,y^{\\mathsf T}\\).'],
      /* ── Multiple integrals ── */
      ['Multiple integrals','swap order of integration (Fubini)','Redraw the region, re-describe it with the other variable outside, rewrite both bounds. Switch when one order is intractable.'],
      ['Multiple integrals','change of variables / Jacobian for area','\\(dA_{xy}=\\bigl|\\tfrac{\\partial(x,y)}{\\partial(u,v)}\\bigr|dA_{uv}\\), and \\(\\tfrac{\\partial(x,y)}{\\partial(u,v)}=\\bigl(\\tfrac{\\partial(u,v)}{\\partial(x,y)}\\bigr)^{-1}\\).'],
      ['Multiple integrals','polar / cylindrical / spherical volume','Polar \\(dA=r\\,dr\\,d\\theta\\); cyl. \\(dV=r\\,dr\\,d\\theta\\,dz\\); spherical \\(dV=\\rho^2\\sin\\phi\\,d\\rho\\,d\\phi\\,d\\theta\\).'],
      /* ── Line integrals & Green ── */
      ['Line integrals','work integral & Green\'s theorem','\\(\\int_\\gamma F\\cdot d\\gamma=\\int F(\\gamma)\\cdot\\gamma\'\\,dt\\). Green: \\(\\oint F\\cdot d\\gamma=\\iint(\\partial_xQ-\\partial_yP)\\,dA\\).'],
      ['Line integrals','flux in the plane (2-D divergence)','\\(\\oint_\\gamma F\\cdot n\\,ds=\\iint_D(\\partial_xP+\\partial_yQ)\\,dA\\) (outward normal).'],
      ['Line integrals','conservative field / potential / path independence','\\(F=\\nabla\\phi\\iff\\nabla\\times F=0\\) (simply connected) \\(\\Rightarrow\\int_\\gamma F\\cdot d\\gamma=\\phi(\\text{end})-\\phi(\\text{start})\\).'],
      /* ── Vector calculus ── */
      ['Vector calculus','curl & divergence','\\(\\nabla\\!\\cdot F=\\partial_xP+\\partial_yQ+\\partial_zR\\); \\(\\nabla\\times F=\\det\\bigl(\\begin{smallmatrix}i&j&k\\\\\\partial_x&\\partial_y&\\partial_z\\\\P&Q&R\\end{smallmatrix}\\bigr)\\).'],
      ['Vector calculus','identities \\(\\nabla\\times\\nabla f=0,\\ \\nabla\\!\\cdot(\\nabla\\times F)=0\\)','A gradient is curl-free; a curl is divergence-free. Use to spot when a field is exact or solenoidal.'],
      ['Vector calculus','Helmholtz decomposition trick','Split \\(F=\\nabla\\phi+(F-\\nabla\\phi)\\): pick \\(\\phi\\) with \\(\\Delta\\phi=\\nabla\\!\\cdot F\\); then \\(\\nabla\\phi\\) is curl-free and \\(F-\\nabla\\phi\\) is divergence-free.'],
      /* ── Big theorems ── */
      ['Big theorems','divergence theorem','\\(\\oiint_{\\partial U}F\\cdot n\\,dS=\\iiint_U\\nabla\\!\\cdot F\\,dV\\) — convert messy surface flux to a volume integral.'],
      ['Big theorems','Stokes\' theorem','\\(\\oint_{\\partial S}F\\cdot d\\gamma=\\iint_S(\\nabla\\times F)\\cdot n\\,dS\\) — swap a hard line integral for a flux of the curl through any spanning surface.'],
      /* ── Surfaces ── */
      ['Surfaces','surface integral, area & normal','Parametrize \\(\\Phi(u,v)\\): \\(dS=\\lVert\\Phi_u\\times\\Phi_v\\rVert\\,du\\,dv\\), normal \\(=\\Phi_u\\times\\Phi_v\\) (check direction at a point).'],
      ['Surfaces','centroid / mass / moment','\\(\\bar x=\\iint x\\,dS/\\iint dS\\); mass \\(=\\iint\\rho\\,dS\\). Use symmetry to zero components.'],
      ['Surfaces','arc length','\\(L=\\int\\lVert\\mathbf r\'(t)\\rVert\\,dt\\).'],
      /* ── Differential forms ── */
      ['Differential forms','evaluate a form (e.g. \\(\\int_C z^2\\,dy\\wedge dx\\))','\\(dy\\wedge dx=-dx\\wedge dy\\); pull back to parameters; orientation sign matters.'],
      /* ── Series ── */
      ['Series','choose a convergence test','Ratio/root for factorials & \\(n\\)th powers; \\(p\\)-series \\(\\sum1/n^p\\) conv \\(\\iff p>1\\); comparison / limit comparison; integral test; alternating-series test.'],
      ['Series','absolute vs conditional convergence','Abs. conv. \\(\\Rightarrow\\) conv. Conv. but \\(\\sum|a_n|\\) diverges \\(=\\) conditional. (Rearranging a conditional series can change the sum.)'],
      ['Series','alternating-series error bound','For a convergent alternating series, \\(|S-s_n|\\le\\) first omitted term \\(|a_{n+1}|\\).'],
      ['Series','radius & interval of convergence','\\(R=\\lim|a_n/a_{n+1}|\\) (or \\(1/\\limsup|a_n|^{1/n}\\)); then test BOTH endpoints separately.'],
      ['Series','Taylor / Maclaurin + known series','\\(f(x)=\\sum\\tfrac{f^{(n)}(a)}{n!}(x-a)^n\\). Memorize \\(e^x,\\sin x,\\cos x,\\tfrac1{1-x},\\ln(1+x)\\); differentiate/integrate term-by-term.'],
      /* ── Fourier ── */
      ['Fourier','Fourier coefficients (period \\(2\\pi\\))','\\(a_0=\\tfrac1{2\\pi}\\!\\int_0^{2\\pi}\\!f,\\ a_n=\\tfrac1\\pi\\!\\int_0^{2\\pi}\\!f\\cos nx,\\ b_n=\\tfrac1\\pi\\!\\int_0^{2\\pi}\\!f\\sin nx\\). At a jump → midpoint value.'],
      ['Fourier','odd/even & half-range symmetry','Even \\(f\\) → only \\(\\cos\\) (\\(b_n=0\\)); odd \\(f\\) → only \\(\\sin\\) (\\(a_n=0\\)). Saves half the integrals.'],
    ]
  }
};

const params=new URLSearchParams(location.search);
const SUBJ = (params.get('subj')==='calc') ? 'calc' : 'la';
const BANK = BANKS[SUBJ];
const KEY  = 'studyhub_cheat_'+SUBJ;
document.body.classList.add(SUBJ==='calc'?'subject-calc':'subject-la');
const CAP = 40;   // ≈ how many dense items fit on a 2-page (double-sided A4) sheet

let state = (()=>{ try{return JSON.parse(localStorage.getItem(KEY)||'{}');}catch{return{};} })();
const save = ()=>localStorage.setItem(KEY, JSON.stringify(state));

document.getElementById('cs-title').textContent = BANK.name+' — Cheat-Sheet Builder';
document.getElementById('crumb-sub').textContent = 'CHEAT SHEET · '+BANK.name.toUpperCase();
document.getElementById('cs-intro').innerHTML =
  'Go through every method — the small tricks too — and answer one thing: <b>can you do it cold, without looking?</b> '+
  'Mark <b>“need it”</b> and its formula joins your sheet right below. Then <b>⎙ Print / Save PDF</b> gives a dense, headed, <b>≤ 2-page</b> sheet (one double-sided A4). '+
  '<br><span style="color:var(--text3)">'+BANK.exam+'</span>';

function render(){
  const quiz=document.getElementById('cs-quiz');
  const groups={};
  BANK.skills.forEach((s,i)=>{ (groups[s[0]]=groups[s[0]]||[]).push([i,s]); });
  quiz.innerHTML = Object.entries(groups).map(([topic,items])=>{
    const gn=items.filter(([i])=>state[i]==='need').length;
    return `<div class="cs-grp-label" data-need="${gn}">${topic}<span class="gc">${gn?gn+' on sheet':''}</span></div>`+
      items.map(([i,s])=>{
        const st=state[i];
        return `<div class="cs-q ${st||''}" data-i="${i}">
          <div class="cs-q-text">Can you <span class="meth">${s[1]}</span>?</div>
          <div class="cs-btns">
            <button class="cs-b know-b ${st==='know'?'on':''}" data-v="know" data-i="${i}">✓ I know it</button>
            <button class="cs-b need-b ${st==='need'?'on':''}" data-v="need" data-i="${i}">✗ Need it</button>
          </div>
          <div class="cs-formula">
            <div class="cs-print-q">${s[1].charAt(0).toUpperCase()+s[1].slice(1)}</div>
            <div class="cs-item-f">${s[2]}</div>
          </div>
        </div>`;
      }).join('');
  }).join('');

  let need=0, known=0; const total=BANK.skills.length;
  BANK.skills.forEach((s,i)=>{ if(state[i]==='need')need++; else if(state[i]==='know')known++; });

  const pct=Math.min(100, Math.round(need/CAP*100));
  const fill=document.getElementById('cs-gauge-fill');
  fill.style.width=pct+'%';
  fill.style.background = need<=CAP*0.8 ? '#15803d' : need<=CAP ? '#d97706' : '#dc2626';
  document.getElementById('cs-gauge-txt').innerHTML =
    `<b style="color:${need>CAP?'#dc2626':'var(--text2)'}">${need}</b> on sheet · ≈ ${need===0?0:(need<=CAP?'≤ 2':'> 2')} pages`+
    (need>CAP?` · <span style="color:#dc2626">trim ${need-CAP} to fit a double-sided A4</span>`:` <span style="color:var(--text3)">(≈ ${CAP} fills 2 pages)</span>`);
  document.getElementById('cs-stat').textContent = `${known} known · ${total-known-need} unmarked · ${total} total`;
  if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([quiz]);
}

document.getElementById('cs-quiz').addEventListener('click',e=>{
  const b=e.target.closest('.cs-b'); if(!b) return;
  const i=b.dataset.i, v=b.dataset.v;
  if(state[i]===v) delete state[i]; else state[i]=v;
  save(); render();
});
document.getElementById('bulk-need').addEventListener('click',()=>{ BANK.skills.forEach((s,i)=>state[i]='need'); save(); render(); });
document.getElementById('bulk-know').addEventListener('click',()=>{ BANK.skills.forEach((s,i)=>state[i]='know'); save(); render(); });
document.getElementById('cs-reset').addEventListener('click',()=>{
  if(!confirm('Clear all your answers for '+BANK.name+'?')) return;
  state={}; save(); render();
});

const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],D=['SUN','MON','TUE','WED','THU','FRI','SAT'],d=new Date();
document.getElementById('td').textContent=`${D[d.getDay()]} · ${d.getDate()} ${M[d.getMonth()].toUpperCase()} ${d.getFullYear()}`;
render();
</script>
<button class="theme-toggle" aria-label="Toggle dark mode" onclick="(function(){var h=document.documentElement,n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);try{localStorage.setItem('studyhub_theme',n);}catch(e){}})()"></button>
</body>
