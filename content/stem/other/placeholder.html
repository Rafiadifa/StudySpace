<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work in Progress</title>
  <link rel="stylesheet" href="../../../style.css">
  <script>(function(){try{var t=localStorage.getItem("studyhub_theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
</head>
<body>
  <div class="placeholder-wrap">
    <div class="placeholder-dot"></div>
    <div class="placeholder-label">Work in progress</div>
    <div class="placeholder-title">Not yet.</div>
    <p class="placeholder-desc">Rafi will update this page with exercises and notes in the future.</p>
    <a href="../../../index.html" class="placeholder-back">← Back to Study Hub</a>
  </div>
  <button class="theme-toggle" aria-label="Toggle dark mode" onclick="(function(){var h=document.documentElement,n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);try{localStorage.setItem('studyhub_theme',n);}catch(e){}})()"></button>
</body>
</html>
