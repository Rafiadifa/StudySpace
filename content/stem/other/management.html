<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTech Inc. Background</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #1f2937; }
        .container { max-width: 600px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 50px 40px; text-align: center; position: relative; }
        
        /* Minimal Back Button */
        .back-btn { position: absolute; left: 20px; top: 20px; color: #9ca3af; text-decoration: none; font-size: 0.9em; font-weight: 600; transition: color 0.2s; }
        .back-btn:hover { color: #4c1d95; }

        h1 { color: #4c1d95; font-size: 2.8em; letter-spacing: 1px; margin-top: 10px; margin-bottom: 8px; }
        .slogan { font-style: italic; color: #4b5563; font-size: 1.2em; margin-bottom: 30px; }
        .meeting { display: inline-block; background: #e0e7ff; color: #4338ca; padding: 8px 18px; border-radius: 20px; font-weight: 600; font-size: 1em; }
    </style>
</head>
<body>

<div class="container">
    <a href="../../../index.html" class="back-btn">← Hub</a>
    <h1>NOVATECH INC</h1>
    <p class="slogan">Towards a better future</p>
    <div class="meeting">📅 General Meeting Q2 2026</div>
</div>

</body>
</html>
